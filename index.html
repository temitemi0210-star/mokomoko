<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学生向け学習支援アプリ</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #fff7fb;
      color: #555;
    }

    header {
      background: #ffd6e7;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #7a4e65;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 1100px;
      margin: 20px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    h2 {
      color: #c76b98;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 15px;
      border: 2px solid #ffd6e7;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 15px;
      background: #ff9ec7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .task {
      background: #fff0f6;
      border-radius: 20px;
      padding: 15px;
      margin-top: 15px;
    }

    .high {
      border-left: 8px solid #ff6b81;
    }

    .medium {
      border-left: 8px solid #ffd166;
    }

    .low {
      border-left: 8px solid #7bd389;
    }

    .complete-btn {
      background: #8fd3ff;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
      color: #d45d8f;
    }

    ul {
      padding-left: 20px;
    }

    .cute {
      font-size: 20px;
    }
  </style>
</head>
<body>

<header>
  🎀 大学生向け学習サポートアプリ 🎀
</header>

<div class="container">

  <div class="card">
    <h2>課題追加</h2>

    <input type="text" id="taskName" placeholder="課題名を入力">

    <select id="importance">
      <option value="high">重要度：高</option>
      <option value="medium">重要度：中</option>
      <option value="low">重要度：低</option>
    </select>

    <input type="date" id="deadline">

    <select id="weight">
      <option>課題の重さ：重い</option>
      <option>課題の重さ：普通</option>
      <option>課題の重さ：軽い</option>
    </select>

    <select id="mood">
      <option>今日の気分：元気</option>
      <option>今日の気分：眠い</option>
      <option>今日の気分：やる気が出ない</option>
      <option>今日の気分：集中できる</option>
    </select>

    <select id="todayGoal">
      <option>今日やりたいこと：課題</option>
      <option>今日やりたいこと：復習</option>
      <option>今日やりたいこと：休憩</option>
      <option>今日やりたいこと：作業</option>
    </select>

    <button onclick="addTask()">課題を追加</button>

    <div class="message" id="recommendMessage"></div>
  </div>

  <div class="card">
    <h2>空きPC情報</h2>
    <p>PC室A：空き 12台</p>
    <p>PC室B：空き 5台</p>
    <p>※ 後でデータ追加予定</p>
  </div>

  <div class="card">
    <h2>教室コンセント情報</h2>
    <ul>
      <li>301教室：前列にあり</li>
      <li>502教
