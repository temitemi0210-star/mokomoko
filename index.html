<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学生向け学習支援アプリ</title>

<style>

body{
  font-family:sans-serif;
  background:#fff7fb;
  margin:0;
}

header{
  background:#ffd6e7;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;

  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;

  box-shadow:
  0 2px 8px rgba(0,0,0,.1);
}

input,
select,
button{

  width:100%;
  padding:10px;
  margin-top:8px;
  box-sizing:border-box;
}

button{

  background:#ff9ec7;
  color:white;

  border:none;
  border-radius:10px;
}

.task{

  background:#fff0f6;

  padding:12px;
  margin-top:10px;

  border-radius:12px;
}

.high{
  border-left:6px solid #ff6b81;
}

.medium{
  border-left:6px solid #ffd166;
}

.low{
  border-left:6px solid #7bd389;
}
  #kijiponMessage{

  margin-top:15px;

  background:#fff0f6;

  padding:15px;

  border-radius:15px;

  font-weight:bold;

  color:#c76b98;
}
.overdue{
  border-left:6px solid #ff0000;
  background:#ffe5e5;
}

</style>
</head>

<body>

<header>
🎀 大学生向け学習サポートアプリ 🎀
</header>

<div class="container">

  <div class="card">

    <h2>📚 課題追加</h2>

    <input
      id="taskName"
      placeholder="課題名">

    <input
      id="taskMemo"
      placeholder="課題メモ">

    <select id="importance">

      <option value="high">
        重要度：高
      </option>

      <option value="medium">
        重要度：中
      </option>

      <option value="low">
        重要度：低
      </option>

    </select>

    <input
      type="date"
      id="deadline">

    <select id="weight">

      <option value="heavy">
        課題の重さ：重い
      </option>

      <option value="normal">
        課題の重さ：普通
      </option>

      <option value="light">
        課題の重さ：軽い
      </option>

    </select>

    <button onclick="addTask()">
      課題追加
    </button>

  </div>

  <div class="card">

    <h2>🌸 今日の状態</h2>

    <select id="mood">

      <option>
        今日の気分：元気
      </option>

      <option>
        今日の気分：眠い
      </option>

      <option>
        今日の気分：やる気が出ない
      </option>

      <option>
        今日の気分：集中できる
      </option>

    </select>

    <select id="todayGoal">

      <option>
        今日やりたいこと：課題
      </option>

      <option>
        今日やりたいこと：復習
      </option>

      <option>
        今日やりたいこと：休憩
      </option>

    </select>

    <div id="recommendMessage"></div>
    <div class="card">

  <h2>🌸 今日の状態</h2>

  <select id="mood">

  </div>
  <div class="card">

  <h3>🎯 今日やるべき課題 TOP3</h3>

  <div id="topTasks"></div>

</div>
  

  <div class="card">

    <h2>
      💻 今空いているPC室
    </h2>

    <div id="availableRooms"></div>

  </div>

  <div class="card">

    <h2>
      🔌 コンセント情報
    </h2>

    <ul>
      <li>図書館：多数あり</li>
      <li>杏彩館：利用可能</li>
    </ul>

  </div>

</div>

<div class="container">

  <div
    class="card"
    style="grid-column:1/-1">

    <h2>課題一覧</h2>

    <div id="taskList"></div>

  </div>

</div>

<script>
let tasks =
JSON.parse(
  localStorage.getItem("tasks")
) || [];

const pcRooms = {

  "演1":{
    "月":["昼休み"],
    "火":["昼休み"],
    "水":["2限","昼休み"],
    "木":["昼休み","3限","4限","5限"],
    "金":["昼休み","4限","5限"]
  },

  "演2":{
    "月":["1限","昼休み"],
    "火":["昼休み","3限"],
    "水":["1限","昼休み","3限"],
    "木":["1限","昼休み","3限","4限","5限"],
    "金":["昼休み"]
  },

  "演3":{
    "月":["1限","昼休み","5限"],
    "火":["2限","昼休み","3限"],
    "水":["昼休み"],
    "木":["1限","昼休み","3限","4限","5限"],
    "金":["1限","昼休み","4限","5限"]
  },

  "演4 5":{
    "月":["1限","昼休み","5限"],
    "火":["1限","2限","昼休み","4限","5限"],
    "水":["1限","2限","昼休み","3限","5限"],
    "木":["1限","昼休み","3限","4限","5限"],
    "金":["1限","昼休み","3限","4限","5限"]
  },

  "演6":{
    "月":["昼休み","3限"],
    "火":["昼休み"],
    "水":["1限","2限","昼休み","4限","5限"],
    "木":["2限","昼休み","3限","4限","5限"],
    "金":["1限","昼休み","4限","5限"]
  },

  "演7":{
    "月":["1限","昼休み","3限","5限"],
    "火":["1限","昼休み","3限","4限","5限"],
    "水":["1限","昼休み","3限","5限"],
    "木":["1限","昼休み","3限","4限","5限"],
    "金":["1限","2限","昼休み","3限","4限","5限"]
  }

};

function saveTasks(){

  localStorage.setItem(
    "tasks",
    JSON.stringify(tasks)
  );
}

function removeExpiredTasks(){

  const today = new Date();

  today.setHours(0,0,0,0);

  tasks = tasks.filter(task => {

    if(!task.deadline){
      return true;
    }

    const deadline =
      new Date(task.deadline);

    const diffDays =
      (today - deadline) /
      (1000 * 60 * 60 * 24);

    return diffDays < 2;
  });

  saveTasks();
}

function addTask(){

  const task = {

    taskName:
      document.getElementById(
        "taskName"
      ).value,

    taskMemo:
      document.getElementById(
        "taskMemo"
      ).value,

    importance:
      document.getElementById(
        "importance"
      ).value,

    deadline:
      document.getElementById(
        "deadline"
      ).value,

    weight:
      document.getElementById(
        "weight"
      ).value,

    completed:false
  };

  if(task.taskName === ""){

    alert(
      "課題名を入力してください"
    );

    return;
  }

tasks.push(task);

saveTasks();

renderTasks();

displayTopTasks();

  document.getElementById(
    "taskName"
  ).value = "";

  document.getElementById(
    "taskMemo"
  ).value = "";
}

function renderTasks(){

  removeExpiredTasks();

  const order = {

    high:1,
    medium:2,
    low:3

  };

  tasks.sort(
    (a,b) =>
      order[a.importance]
      -
      order[b.importance]
  );

  const taskList =
  document.getElementById(
    "taskList"
  );

  taskList.innerHTML = "";

  tasks.forEach(
    (task,index) => {
      let overdue = false;

if(task.deadline){

  const today = new Date();

  today.setHours(0,0,0,0);

  const deadline =
    new Date(task.deadline);

  overdue =
    deadline < today;
}

      taskList.innerHTML +=
      `
<div class="task ${task.importance}
${overdue ? 'overdue' : ''}">

        <h3>
          📝 ${task.taskName}
        </h3>

        <p>
          メモ：
          ${task.taskMemo}
        </p>

<p>
締切：
${task.deadline}

<br>

⏳あと
${getRemainingDays(task.deadline)}
日
</p>

        <p>
          ${task.weight}
        </p>

        <button
          onclick=
          "completeTask(${index})">

          ${
            task.completed
            ?
            "完了済み🌸"
            :
            "課題完了！"
          }

        </button>

      </div>
      `;
  });

  recommendation();
}
function getRemainingDays(deadline){

  if(!deadline){
    return "-";
  }

  const today = new Date();

  today.setHours(0,0,0,0);

  const target =
    new Date(deadline);

  return Math.ceil(
    (
      target - today
    ) /
    (1000*60*60*24)
  );
}
function completeTask(index){

  tasks[index].completed = true;

  saveTasks();

  renderTasks();

  const praise = [
    "えらい！✨",
    "すごい！🌸",
    "よく頑張ったね！💖",
    "着実に進んでる！🎀",
    "その調子！☀️"
  ];

  alert(
    praise[
      Math.floor(
        Math.random() * praise.length
      )
    ]
  );
}

function displayTopTasks(){

  const topTasks =
    [...tasks]
    .filter(task=>!task.completed)
    .sort((a,b)=>{

      const score={
        high:3,
        medium:2,
        low:1
      };

      return (
        score[b.importance]
        -
        score[a.importance]
      );

    })
    .slice(0,3);

  const target =
    document.getElementById(
      "topTasks"
    );

  target.innerHTML="";

  topTasks.forEach(task=>{

    target.innerHTML +=
    `
    <div class="task">
      <b>${task.taskName}</b>
    </div>
    `;
  });

}


function recommendation(){

  const mood =
    document.getElementById("mood").value;

  const goal =
    document.getElementById("todayGoal").value;

  const msg =
    document.getElementById("recommendMessage");

  const kijipon =
    document.getElementById("kijiponMessage");

  const highTasks =
    tasks.filter(
      t => t.importance === "high"
    ).length;

  const heavyTasks =
    tasks.filter(
      t => t.weight === "heavy"
    ).length;

  const day = getJapaneseDay();
  const period = getCurrentPeriod();

  let availableRooms = [];

  if(period){

    for(const room in pcRooms){

      if(
        pcRooms[room][day] &&
        pcRooms[room][day].includes(period)
      ){
        availableRooms.push(room);
      }

    }
  }

  if(mood.includes("眠い")){

    msg.innerHTML =
      "☕ 眠そうなので図書館で軽めの復習がおすすめ！";

    kijipon.innerHTML =
      "🐤きじぽん：無理しすぎないでね！";

  }

  else if(goal.includes("休憩")){

    msg.innerHTML =
      "🌸 空きコマは休憩してリフレッシュしよう！";

    kijipon.innerHTML =
      "🐤きじぽん：休憩も大切だよ🌸";

  }

  else if(highTasks >= 2 || heavyTasks >= 2){

    msg.innerHTML =
      `🔥 重要な課題があります！<br>
      ${availableRooms[0] || "図書館"}
      で集中して進めましょう！`;

    kijipon.innerHTML =
      "🐤きじぽん：優先度の高い課題から進めよう！";

  }

  else if(mood.includes("集中")){

    msg.innerHTML =
      `💻 ${
        availableRooms[0] || "図書館"
      } が空いています！<br>
      課題を進めるチャンスです！`;

    kijipon.innerHTML =
      "🐤きじぽん：今がチャンス！";

  }

  else{

    msg.innerHTML =
      "📚 少しずつ課題を進めましょう！";

    kijipon.innerHTML =
      "🐤きじぽん：コツコツ進めよう！";
  }

}

function getJapaneseDay(){

  return [

    "日",
    "月",
    "火",
    "水",
    "木",
    "金",
    "土"

  ][new Date().getDay()];
}

function getCurrentPeriod(){

  const now =
    new Date();

  const minutes =

    now.getHours()*60
    +
    now.getMinutes();

  if(
    minutes >= 540
    &&
    minutes < 640
  ){
    return "1限";
  }

  if(
    minutes >= 650
    &&
    minutes < 750
  ){
    return "2限";
  }

  if(
    minutes >= 750
    &&
    minutes < 800
  ){
    return "昼休み";
  }

  if(
    minutes >= 800
    &&
    minutes < 900
  ){
    return "3限";
  }

  if(
    minutes >= 910
    &&
    minutes < 1010
  ){
    return "4限";
  }

  if(
    minutes >= 1020
    &&
    minutes < 1120
  ){
    return "5限";
  }

  return null;
}

function displayAvailableRooms(){

  const day =
    getJapaneseDay();

  const period =
    getCurrentPeriod();

  const target =
    document.getElementById(
      "availableRooms"
    );

  if(
    period === null
  ){

    target.innerHTML =
    "現在は授業時間外です";

    return;
  }

  let available = [];

  for(
    const room
    in
    pcRooms
  ){

    if(

      pcRooms[room][day]
      &&
      pcRooms[room][day]
      .includes(period)

    ){

      available.push(room);
    }
  }

  target.innerHTML =
  `
    <b>現在：</b>
    ${day}曜日
    ${period}
    <br>

    <b>
      空いているPC室
    </b>
    <br>

    ${
      available.length > 0
      ?
      available.join("、")
      :
      "なし"
    }
  `;
}

window.onload =
function(){

  renderTasks();

  displayAvailableRooms();

  recommendation();

  displayTopTasks();

};
</script>

</body>
</html>
