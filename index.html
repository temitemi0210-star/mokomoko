<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>もこもこ☆リンク</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #050310;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    display: flex; justify-content: center; align-items: center;
  }
  #gameContainer {
    position: relative; width: 100%; height: 100%;
    max-width: 480px; aspect-ratio: 9/16;
    background: radial-gradient(circle at 50% 50%, #1a0e35 0%, #050310 100%);
    overflow: hidden;
  }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #uiLayer {
    position: absolute; top: 20px; width: 100%;
    display: flex; justify-content: space-around;
    pointer-events: none; z-index: 100;
  }
  .hud {
    background: rgba(0,0,0,0.6); padding: 8px 20px;
    border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-weight: 900;
  }
  #guide {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #FFD700; font-family: 'DotGothic16'; font-size: 24px;
    text-shadow: 0 0 10px rgba(255,215,0,0.8); pointer-events: none;
    transition: opacity 0.5s; z-index: 50;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="bgCanvas"></canvas>
  <canvas id="effectCanvas"></canvas>
  <div id="uiLayer">
    <div class="hud">SCORE: <span id="score">0</span></div>
  </div>
  <div id="guide">同じ色をなぞってつなげてね</div>
</div>

<script>
'use strict';

const COLORS = [
  { fill: '#FF006E', glow: 'rgba(255, 0, 110, 0.8)' },
  { fill: '#3A86FF', glow: 'rgba(58, 134, 255, 0.8)' },
  { fill: '#FFBE0B', glow: 'rgba(255, 190, 11, 0.8)' },
  { fill: '#8338EC', glow: 'rgba(131, 56, 236, 0.8)' },
  { fill: '#06D6A0', glow: 'rgba(6, 214, 160, 0.8)' }
];

const bgCanvas = document.getElementById('bgCanvas');
const efCanvas = document.getElementById('effectCanvas');
const bctx = bgCanvas.getContext('2d');
const ectx = efCanvas.getContext('2d');
const scoreEl = document.getElementById('score');
const guide = document.getElementById('guide');

let width, height, dots = [], selectedDots = [], sparkles = [], score = 0;
const DOT_RADIUS = 28;
const GRID_SIZE = 70;

function resize() {
  const rect = bgCanvas.parentElement.getBoundingClientRect();
  width = bgCanvas.width = efCanvas.width = rect.width;
  height = bgCanvas.height = efCanvas.height = rect.height;
  initGrid();
}

class Dot {
  constructor(col, row) {
    this.col = col;
    this.row = row;
    this.colorIdx = Math.floor(Math.random() * COLORS.length);
    this.resetPos();
    this.scale = 1;
  }
  resetPos() {
    this.x = width / 2 + (this.col - 2) * GRID_SIZE;
    this.y = height / 2 + (this.row - 3) * GRID_SIZE;
  }
}

class Sparkle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8;
    this.life = 1.0;
    this.color = color;
  }
  update() {
    this.vy += 0.2; this.x += this.vx; this.y += this.vy; this.life -= 0.03;
  }
}

function initGrid() {
  dots = [];
  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 5; c++) {
      dots.push(new Dot(c, r));
    }
  }
}

function getDotAt(x, y) {
  return dots.find(d => Math.hypot(d.x - x, d.y - y) < DOT_RADIUS);
}

function handleInput(ex, ey, isEnd = false) {
  if (guide.style.opacity !== '0') guide.style.opacity = '0';
  const rect = efCanvas.getBoundingClientRect();
  const x = ex - rect.left, y = ey - rect.top;

  if (isEnd) {
    if (selectedDots.length >= 3) {
      score += selectedDots.length * 10;
      scoreEl.innerText = score;
      selectedDots.forEach(d => {
        for(let i=0; i<15; i++) sparkles.push(new Sparkle(d.x, d.y, COLORS[d.colorIdx].fill));
        d.colorIdx = Math.floor(Math.random() * COLORS.length);
      });
    }
    selectedDots = [];
    return;
  }

  const dot = getDotAt(x, y);
  if (dot) {
    if (selectedDots.length === 0) {
      selectedDots.push(dot);
    } else {
      const last = selectedDots[selectedDots.length - 1];
      if (dot.colorIdx === last.colorIdx && !selectedDots.includes(dot)) {
        const dist = Math.hypot(dot.col - last.col, dot.row - last.row);
        if (dist <= 1.5) selectedDots.push(dot);
      }
    }
  }
  // マウス位置に火花
  for(let i=0; i<2; i++) sparkles.push(new Sparkle(x, y, '#FFE082'));
}

efCanvas.addEventListener('mousedown', e => handleInput(e.clientX, e.clientY));
efCanvas.addEventListener('mousemove', e => { if(e.buttons) handleInput(e.clientX, e.clientY) });
window.addEventListener('mouseup', e => handleInput(e.clientX, e.clientY, true));
efCanvas.addEventListener('touchstart', e => handleInput(e.touches[0].clientX, e.touches[0].clientY));
efCanvas.addEventListener('touchmove', e => handleInput(e.touches[0].clientX, e.touches[0].clientY));
efCanvas.addEventListener('touchend', e => handleInput(0, 0, true));

function draw() {
  bctx.fillStyle = '#050310';
  bctx.fillRect(0, 0, width, height);
  ectx.clearRect(0, 0, width, height);

  // つないでいる線
  if (selectedDots.length > 0) {
    ectx.beginPath();
    ectx.strokeStyle = COLORS[selectedDots[0].colorIdx].fill;
    ectx.lineWidth = 5;
    selectedDots.forEach((d, i) => {
      if (i === 0) ectx.moveTo(d.x, d.y); else ectx.lineTo(d.x, d.y);
    });
    ectx.stroke();
  }

  dots.forEach(d => {
    const c = COLORS[d.colorIdx];
    bctx.shadowBlur = selectedDots.includes(d) ? 25 : 10;
    bctx.shadowColor = c.glow;
    bctx.fillStyle = c.fill;
    bctx.beginPath();
    bctx.arc(d.x, d.y, DOT_RADIUS * (selectedDots.includes(d) ? 1.2 : 1), 0, Math.PI * 2);
    bctx.fill();
    bctx.shadowBlur = 0;
  });

  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.update();
    ectx.globalAlpha = s.life;
    ectx.fillStyle = s.color;
    ectx.beginPath(); ectx.arc(s.x, s.y, 2, 0, Math.PI * 2); ectx.fill();
    if (s.life <= 0) sparkles.splice(i, 1);
  }
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();

</script>
</body>
</html>
