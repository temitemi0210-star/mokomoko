<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>もこもこ☆リンク Max</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #020108;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    display: flex; justify-content: center; align-items: center;
  }
  #gameContainer {
    position: relative; width: 100%; height: 100%;
    max-width: 540px; aspect-ratio: 9/16;
    background: radial-gradient(circle at 50% 50%, #1a0e35 0%, #020108 100%);
    overflow: hidden;
  }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #uiLayer {
    position: absolute; top: 25px; width: 100%;
    display: flex; justify-content: center;
    pointer-events: none; z-index: 100;
  }
  .hud {
    background: rgba(255,255,255,0.1); padding: 10px 30px;
    border-radius: 40px; border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color: #fff; font-size: 1.5rem; font-weight: 900;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }
  #guide {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #FFD700; font-family: 'DotGothic16'; font-size: 28px;
    text-shadow: 0 0 20px rgba(255,215,0,1); pointer-events: none;
    transition: opacity 0.5s; z-index: 50; text-align: center;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="bgCanvas"></canvas>
  <canvas id="effectCanvas"></canvas>
  <div id="uiLayer">
    <div class="hud">SCORE: <span id="score">0</span></div>
  </div>
  <div id="guide">いっぱい繋げて<br>パチパチさせよう！</div>
</div>

<script>
'use strict';

const COLORS = [
  { fill: '#FF0055', glow: 'rgba(255, 0, 85, 0.9)', highlight: '#FF80AA' },
  { fill: '#0077FF', glow: 'rgba(0, 119, 255, 0.9)', highlight: '#80BBFF' },
  { fill: '#FFB300', glow: 'rgba(255, 179, 0, 0.9)', highlight: '#FFD980' },
  { fill: '#9900FF', glow: 'rgba(153, 0, 255, 0.9)', highlight: '#CC80FF' },
  { fill: '#00DD77', glow: 'rgba(0, 221, 119, 0.9)', highlight: '#80EEBB' }
];

const bgCanvas = document.getElementById('bgCanvas');
const efCanvas = document.getElementById('effectCanvas');
const bctx = bgCanvas.getContext('2d');
const ectx = efCanvas.getContext('2d');
const scoreEl = document.getElementById('score');
const guide = document.getElementById('guide');

let width, height, dots = [], selectedDots = [], sparkles = [], score = 0;
const GRID_COLS = 7; // ドットの数を増やしました
const GRID_ROWS = 10;
let cellSize = 0;
let dotRadius = 0;

function resize() {
  const rect = bgCanvas.parentElement.getBoundingClientRect();
  width = bgCanvas.width = efCanvas.width = rect.width;
  height = bgCanvas.height = efCanvas.height = rect.height;
  cellSize = Math.min(width / (GRID_COLS + 0.5), height / (GRID_ROWS + 2));
  dotRadius = cellSize * 0.4;
  initGrid();
}

class Dot {
  constructor(col, row) {
    this.col = col;
    this.row = row;
    this.colorIdx = Math.floor(Math.random() * COLORS.length);
    this.updatePos();
  }
  updatePos() {
    this.x = width / 2 + (this.col - (GRID_COLS-1)/2) * cellSize;
    this.y = height / 2 + (this.row - (GRID_ROWS-1)/2) * cellSize + 40;
  }
}

class Sparkle {
  constructor(x, y, color, speedScale = 1) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const force = Math.random() * 12 * speedScale;
    this.vx = Math.cos(angle) * force;
    this.vy = Math.sin(angle) * force - 2;
    this.life = 1.0;
    this.decay = 0.01 + Math.random() * 0.02;
    this.color = color;
  }
  update() {
    this.vy += 0.3; // 重力強め
    this.vx *= 0.96;
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
  }
}

function initGrid() {
  dots = [];
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      dots.push(new Dot(c, r));
    }
  }
  // 初期から繋ぎやすくするために色を微調整
  for (let i = 0; i < 12; i++) {
    const idx = Math.floor(Math.random() * dots.length);
    const color = dots[idx].colorIdx;
    dots.forEach(d => {
      if (Math.hypot(d.col - dots[idx].col, d.row - dots[idx].row) < 1.5) {
        if (Math.random() > 0.4) d.colorIdx = color;
      }
    });
  }
}

function handleInput(ex, ey, isEnd = false) {
  const rect = efCanvas.getBoundingClientRect();
  const x = ex - rect.left, y = ey - rect.top;

  if (isEnd) {
    if (selectedDots.length >= 3) {
      score += selectedDots.length * 20;
      scoreEl.innerText = score;
      selectedDots.forEach(d => {
        // 火花を大量放出（1ドットにつき30個以上！）
        const color = COLORS[d.colorIdx].fill;
        for(let i=0; i<35; i++) sparkles.push(new Sparkle(d.x, d.y, color, 1.5));
        d.colorIdx = Math.floor(Math.random() * COLORS.length);
      });
    }
    selectedDots = [];
    return;
  }

  const dot = dots.find(d => Math.hypot(d.x - x, d.y - y) < dotRadius * 1.5);
  if (dot) {
    if (guide.style.opacity !== '0') guide.style.opacity = '0';
    if (selectedDots.length === 0) {
      selectedDots.push(dot);
    } else {
      const last = selectedDots[selectedDots.length - 1];
      if (dot.colorIdx === last.colorIdx && !selectedDots.includes(dot)) {
        const dist = Math.max(Math.abs(dot.col - last.col), Math.abs(dot.row - last.row));
        if (dist === 1) selectedDots.push(dot);
      }
    }
  }
  
  // 移動中の微細な火花
  if (ex !== 0) {
    for(let i=0; i<3; i++) sparkles.push(new Sparkle(x, y, '#FFFACD', 0.5));
  }
}

efCanvas.addEventListener('mousedown', e => handleInput(e.clientX, e.clientY));
efCanvas.addEventListener('mousemove', e => { if(e.buttons) handleInput(e.clientX, e.clientY) });
window.addEventListener('mouseup', e => handleInput(e.clientX, e.clientY, true));
efCanvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
efCanvas.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
efCanvas.addEventListener('touchend', e => handleInput(0, 0, true));

function draw() {
  bctx.fillStyle = '#020108';
  bctx.fillRect(0, 0, width, height);
  ectx.clearRect(0, 0, width, height);

  // 接続ラインの演出強化
  if (selectedDots.length > 0) {
    ectx.beginPath();
    ectx.strokeStyle = COLORS[selectedDots[0].colorIdx].fill;
    ectx.lineWidth = 10;
    ectx.lineCap = 'round';
    ectx.lineJoin = 'round';
    ectx.shadowBlur = 20;
    ectx.shadowColor = COLORS[selectedDots[0].colorIdx].glow;
    selectedDots.forEach((d, i) => {
      if (i === 0) ectx.moveTo(d.x, d.y); else ectx.lineTo(d.x, d.y);
    });
    ectx.stroke();
  }

  // ドット描画
  dots.forEach(d => {
    const c = COLORS[d.colorIdx];
    const isSel = selectedDots.includes(d);
    const s = isSel ? 1.3 : 1.0;

    bctx.save();
    bctx.translate(d.x, d.y);
    bctx.shadowBlur = isSel ? 30 : 12;
    bctx.shadowColor = c.glow;
    bctx.fillStyle = c.fill;
    bctx.beginPath();
    bctx.arc(0, 0, dotRadius * s, 0, Math.PI * 2);
    bctx.fill();
    
    // ぷるるんハイライト
    bctx.shadowBlur = 0;
    bctx.fillStyle = c.highlight;
    bctx.beginPath();
    bctx.arc(-dotRadius*0.35*s, -dotRadius*0.35*s, dotRadius*0.25*s, 0, Math.PI * 2);
    bctx.fill();
    bctx.restore();
  });

  // 火花の描画
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.update();
    ectx.globalAlpha = s.life;
    ectx.fillStyle = s.color;
    ectx.shadowBlur = 4;
    ectx.shadowColor = s.color;
    ectx.beginPath(); ectx.arc(s.x, s.y, 2.5, 0, Math.PI * 2); ectx.fill();
    if (s.life <= 0) sparkles.splice(i, 1);
  }
  
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();

</script>
</body>
</html>
