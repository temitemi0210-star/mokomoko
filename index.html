<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0820">
<title>もこもこ☆シューター - 線香花火Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  /* 既存のスタイルを継承 */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050310;
    font-family: 'M PLUS Rounded 1c', -apple-system, sans-serif;
    touch-action: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 20% 10%, rgba(255,143,184,0.15), transparent 40%), #050310;
  }

  #gameContainer {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 480px;
    aspect-ratio: 9 / 16;
    background: radial-gradient(ellipse at 50% 0%, #3a2360 0%, #0d0820 100%);
    overflow: hidden;
  }

  canvas#game {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 1;
  }

  /* 線香花火エフェクト用のキャンバス */
  #sparkleCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5; /* ゲーム要素より上に表示 */
  }

  /* 開始メッセージ */
  #guideMessage {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFE082;
    font-family: 'DotGothic16', sans-serif;
    font-size: 20px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(255, 224, 130, 0.8);
    transition: opacity 1s ease;
  }

  /* HUDなどの既存UI */
  #hud { position: absolute; top: 0; left: 0; right: 0; padding: 14px; display: flex; justify-content: space-between; z-index: 15; color: #fff; pointer-events: none; }
  .hud-card { background: rgba(13,8,32,0.55); border-radius: 14px; padding: 7px 12px; backdrop-filter: blur(10px); }
  .value { font-size: 18px; font-weight: 900; color: #FFE082; }
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(13,8,32,0.9); z-index: 100; color: #fff; text-align: center; }
  .hidden { display: none !important; }
  .start-btn { background: linear-gradient(135deg, #FF8FB8 0%, #B19CD9 100%); border: none; padding: 16px 44px; border-radius: 50px; color: #fff; font-weight: 900; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>

<div id="gameContainer">
  <!-- ゲーム画面 -->
  <canvas id="game"></canvas>
  <!-- 線香花火レイヤー -->
  <canvas id="sparkleCanvas"></canvas>

  <div id="guideMessage">画面にマウスを動かしてね</div>

  <div id="hud">
    <div class="hud-card"><div class="value" id="scoreDisplay">0</div></div>
    <div class="hud-card"><div class="value" id="chainDisplay">×1</div></div>
  </div>

  <div id="titleScreen" class="overlay">
    <h1 style="font-family:'DotGothic16'; font-size: 40px; color:#FF8FB8;">もこもこシューター</h1>
    <button class="start-btn" id="startBtn">スタート</button>
  </div>
</div>

<script>
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const sCanvas = document.getElementById('sparkleCanvas');
const sCtx = sCanvas.getContext('2d');
const guideMsg = document.getElementById('guideMessage');

let width, height;
function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    width = sCanvas.width = canvas.width = rect.width;
    height = sCanvas.height = canvas.height = rect.height;
}
window.addEventListener('resize', resize);
resize();

// --- 線香花火パーティクル ---
let sparkles = [];
class Sparkle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6 - 2;
        this.gravity = 0.15;
        this.life = 1.0;
        this.decay = 0.015 + Math.random() * 0.02;
        // 線香花火の色（暖色系）
        this.color = `hsl(${Math.random() * 20 + 35}, 100%, ${70 + Math.random() * 30}%)`;
    }
    update() {
        this.vx *= 0.95;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        sCtx.globalAlpha = this.life;
        sCtx.fillStyle = this.color;
        sCtx.shadowBlur = 8;
        sCtx.shadowColor = this.color;
        sCtx.beginPath();
        // パチパチとはじける形状
        const size = Math.random() > 0.8 ? 3 : 1.5;
        sCtx.arc(this.x, this.y, size, 0, Math.PI * 2);
        sCtx.fill();
    }
}

// --- インタラクション ---
window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
window.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    handleMove(touch.clientX, touch.clientY);
});

function handleMove(ex, ey) {
    // メッセージを消す
    if (guideMsg.style.opacity !== '0') {
        guideMsg.style.opacity = '0';
    }

    const rect = sCanvas.getBoundingClientRect();
    const x = ex - rect.left;
    const y = ey - rect.top;

    // 火花を生成
    for (let i = 0; i < 4; i++) {
        sparkles.push(new Sparkle(x, y));
    }
}

// --- メインループ ---
function loop() {
    // 線香花火の描画
    sCtx.clearRect(0, 0, width, height);
    sCtx.shadowBlur = 0; // リセット
    
    for (let i = sparkles.length - 1; i >= 0; i--) {
        sparkles[i].update();
        sparkles[i].draw();
        if (sparkles[i].life <= 0) sparkles.splice(i, 1);
    }

    // ゲーム画面の描画（背景を濃い紺色でクリア）
    ctx.fillStyle = '#0d0820';
    ctx.fillRect(0, 0, width, height);
    
    // ここに元のゲームロジックが走ります（簡易版として背景のみ）
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('MOKOMOKO GAME LAYER', width/2, height/2);

    requestAnimationFrame(loop);
}

// スタートボタン
document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('titleScreen').classList.add('hidden');
});

loop();
</script>
</body>
</html>
