<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学生向け学習支援アプリ</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #fff7fb;
      color: #555;
    }

    header {
      background: #ffd6e7;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #7a4e65;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 1100px;
      margin: 20px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    h2 {
      color: #c76b98;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 15px;
      border: 2px solid #ffd6e7;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 15px;
      background: #ff9ec7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .task {
      background: #fff0f6;
      border-radius: 20px;
      padding: 15px;
      margin-top: 15px;
    }

    .high {
      border-left: 8px solid #ff6b81;
    }

    .medium {
      border-left: 8px solid #ffd166;
    }

    .low {
      border-left: 8px solid #7bd389;
    }

    .complete-btn {
      background: #8fd3ff;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
      color: #d45d8f;
    }

    ul {
      padding-left: 20px;
    }

    .cute {
      font-size: 20px;
    }
  </style>
</head>
<body>

<header>
  🎀 大学生向け学習サポートアプリ 🎀
</header>

<div class="container">

  <div class="card">
    <h2>📚 課題追加</h2>

    <input type="text" id="taskName" placeholder="課題名を入力">

    <input type="text" id="taskSource" placeholder="課題の起源（例：情報理論）">

    <select id="importance">
      <option value="high">重要度：高</option>
      <option value="medium">重要度：中</option>
      <option value="low">重要度：低</option>
    </select>

    <input type="date" id="deadline">

    <select id="weight">
      <option value="heavy">課題の重さ：重い</option>
      <option value="normal">課題の重さ：普通</option>
      <option value="light">課題の重さ：軽い</option>
    </select>

    <button onclick="addTask()">課題を追加</button>
  </div>

  <div class="card">
    <h2>🌸 今日の状態</h2>

    <select id="mood">
      <option>今日の気分：元気</option>
      <option>今日の気分：眠い</option>
      <option>今日の気分：やる気が出ない</option>
      <option>今日の気分：集中できる</option>
    </select>

    <select id="todayGoal">
      <option>今日やりたいこと：課題</option>
      <option>今日やりたいこと：復習</option>
      <option>今日やりたいこと：休憩</option>
      <option>今日やりたいこと：作業</option>
    </select>

    <div class="message" id="recommendMessage"></div>
  </div>

  <div class="card">
    <h2>空きPC情報</h2>
    <p>PC室A：空き 12台</p>
    <p>PC室B：空き 5台</p>
    <p>※ 後でデータ追加予定</p>
  </div>

  <div class="card">
    <h2>教室コンセント情報</h2>
    <ul>
      <li>301教室：前列にあり</li>
      <li>502教室：壁側のみ</li>
      <li>図書館：多数あり</li>
    </ul>
    <p>※ 後でデータ追加予定</p>
  </div>

</div>

<div class="container">
  <div class="card" style="grid-column: 1/-1;">
    <h2>🗂 課題一覧ページ</h2>
    <p>重要度順に自動ソートされます！</p>

    <div id="taskPage"></div>
  </div>
</div>

<div class="container">
  <div class="card" style="grid-column: 1/-1;">
    <h2>⭐ 重要度順課題一覧</h2>
    <p>※ 締切を過ぎた課題は自動で削除されます。</p>
    <div id="taskList"></div>
  </div>
</div>

<script>
  let tasks = [];

  function addTask() {
    const taskName = document.getElementById('taskName').value;
    const taskSource = document.getElementById('taskSource').value;
    const importance = document.getElementById('importance').value;
    const deadline = document.getElementById('deadline').value;
    const weight = document.getElementById('weight').value;
    const mood = document.getElementById('mood').value;
    const todayGoal = document.getElementById('todayGoal').value;

    if(taskName === '') {
      alert('課題名を入力してください！');
      return;
    }

    const task = {
      taskName,
      taskSource,
      importance,
      deadline,
      weight,
      mood,
      todayGoal,
      completed: false
    };

    tasks.push(task);

    removeExpiredTasks();
    sortTasks();
    renderTasks();
    recommendation(mood, todayGoal);

    document.getElementById('taskName').value = '';
  }

  function removeExpiredTasks() {
    const today = new Date();

    tasks = tasks.filter(task => {
      if(!task.deadline) return true;

      const deadlineDate = new Date(task.deadline);
      return deadlineDate >= today;
    });
  }

  function sortTasks() {
    const order = {
      high: 1,
      medium: 2,
      low: 3
    };

    tasks.sort((a, b) => order[a.importance] - order[b.importance]);
  }

  function renderTasks() {
    removeExpiredTasks();
    const taskList = document.getElementById('taskList');
    taskList.innerHTML = '';

    tasks.forEach((task, index) => {
      const div = document.createElement('div');
      div.classList.add('task');
      div.classList.add(task.importance);

      div.innerHTML = `
        <h3 class="cute">📝 ${task.taskName}</h3>
        <p>授業：${task.taskSource}</p>
        <p>締切：${task.deadline}</p>
        <p>${task.weight}</p>
        <p>${task.mood}</p>
        <p>${task.todayGoal}</p>
        <button class="complete-btn" onclick="completeTask(${index})">
          ${task.completed ? '完了済み 🌸' : '課題完了！'}
        </button>
      `;

      taskList.appendChild(div);

      const taskPage = document.getElementById('taskPage');

      const pageCard = document.createElement('div');
      pageCard.classList.add('task');
      pageCard.innerHTML = `
        <h3>📖 ${task.taskName}</h3>
        <p>授業：${task.taskSource}</p>
        <p>締切：${task.deadline}</p>
        <p>${task.weight}</p>
      `;

      taskPage.appendChild(pageCard);
    });
  }

  function completeTask(index) {
    tasks[index].completed = true;
    renderTasks();

    alert('えらい！✨ 課題完了です！すごい！');
  }

  function recommendation(mood, goal) {
    const msg = document.getElementById('recommendMessage');

    const highTasks = tasks.filter(task => task.importance === 'high').length;
    const heavyTasks = tasks.filter(task => task.weight === 'heavy').length;

    if(mood.includes('眠い')) {
      msg.innerHTML = '☕ 空きコマはカフェで軽めの復習がおすすめ！';
    }
    else if(mood.includes('集中')) {
      msg.innerHTML = '🔥 空きコマで重い課題を一気に進めよう！';
    }
    else if(goal.includes('休憩')) {
      msg.innerHTML = '🌸 空きコマは友達と休憩してリフレッシュ！';
    }
    else if(highTasks >= 2 || heavyTasks >= 2) {
      msg.innerHTML = '📚 図書館やPC室で集中して進めるのがおすすめ！';
    }
    else {
      msg.innerHTML = '✨ 空きコマで少しずつ課題を進めよう！';
    }
  }
</script>

</body>
</html>
